repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/python -m ruff check .
        language: system
        pass_filenames: false
      - id: mypy-check
        name: mypy check
        entry: .venv/bin/python -m mypy src
        language: system
        pass_filenames: false
      - id: pytest-unit-contract
        name: pytest unit + contract
        entry: .venv/bin/python -m pytest tests/unit tests/contract -q
        language: system
        pass_filenames: false
      - id: bootstrap-assets
        name: bootstrap assets
        entry: .venv/bin/python -m pytest tests/unit/test_bootstrap_assets.py -q
        language: system
        pass_filenames: false
