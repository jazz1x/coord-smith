repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        # Secret scan on staged changes. Config (.gitleaks.toml) extends
        # the upstream default ruleset + project allowlist. A full-history
        # scan runs in CI; this hook is the fast pre-commit gate.
        name: gitleaks (secret scan)

  - repo: local
    # Local hooks delegate to `uv run` so they work on any clone
    # regardless of whether `.venv/` exists at the repo root. This
    # also makes the hooks portable across macOS / Linux / CI
    # environments — pre-commit on a fresh clone after `uv sync`
    # works without an explicit venv-path argument.
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --frozen -- ruff check .
        language: system
        pass_filenames: false
      - id: mypy-check
        name: mypy check
        entry: uv run --frozen -- mypy src
        language: system
        pass_filenames: false
      - id: import-linter
        name: import-linter (layers + no cycles)
        entry: uv run --frozen -- lint-imports
        language: system
        pass_filenames: false
      - id: trivy-fs
        name: trivy filesystem scan
        entry: trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --exit-code 1 .
        language: system
        pass_filenames: false
        # Trivy is not installed by uv; contributors must install the binary
        # themselves (see CONTRIBUTING.md). CI runs the same scan via
        # aquasecurity/trivy-action, so skipping this hook locally does not
        # bypass the security gate.
      - id: pytest-unit-contract
        name: pytest unit + contract
        entry: uv run --frozen -- pytest tests/unit tests/contract -q
        language: system
        pass_filenames: false
      - id: bootstrap-assets
        name: bootstrap assets
        entry: uv run --frozen -- pytest tests/unit/test_bootstrap_assets.py -q
        language: system
        pass_filenames: false
